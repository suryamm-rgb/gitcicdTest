image: node:20-alpine

stages:
  - build
  - deploy

cache:
  paths:
    - node_modules/
    - .next/cache/

# =============================
# BUILD (Install + Lint + Build)
# =============================
build:
  stage: build
  script:
    - npm ci
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - .next
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH

# =============================
# DEPLOY TO TEST
# =============================
deploy-test:
  stage: deploy
  dependencies:
    - build
  script:
    - npm install -g vercel
    - vercel --token $VERCEL_TOKEN --yes --target testing
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
  environment:
    name: testing

# =============================
# DEPLOY TO STAGE
# =============================
deploy-stage:
  stage: deploy
  dependencies:
    - build
  script:
    - npm install -g vercel
    - vercel --token $VERCEL_TOKEN --yes --target staging
  rules:
    - if: $CI_COMMIT_BRANCH == "stage"
  environment:
    name: staging

# =============================
# DEPLOY TO PRODUCTION
# =============================
deploy-production:
  stage: deploy
  dependencies:
    - build
  script:
    - npm install -g vercel
    - vercel --prod --token $VERCEL_TOKEN --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
  when: manual

image: node:20-alpine

stages:
  - build
  - deploy

cache:
  paths:
    - node_modules/

# ======================
# BUILD STAGE
# ======================
build-job:
  stage: build
  script:
    - npm ci
    - npm run lint
    - npm run build
  rules:
    - if: $CI_COMMIT_BRANCH

# ======================
# DEPLOY TO VERCEL
# ======================
deploy-production:
  stage: deploy
  script:
    - npm install -g vercel
    - vercel --prod --token $VERCEL_TOKEN --yes
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
